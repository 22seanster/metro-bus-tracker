name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "./backend[dev]"
      - name: Test
        run: pytest backend/tests -q

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # git rev-list --count needs full history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio==6.1.19
      - name: Build firmware
        run: |
          BUILD=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          cd firmware
          PLATFORMIO_BUILD_FLAGS="-D FW_BUILD=${BUILD} -D FW_SHA='\"${SHA}\"'" pio run -e esp32-s3
          strings .pio/build/esp32-s3/firmware.bin | grep -q "FWID build=${BUILD} " \
            || { echo "FATAL: compiled FW_BUILD does not match ${BUILD}"; exit 1; }
          mkdir -p ../backend/app/firmware
          cp .pio/build/esp32-s3/firmware.bin ../backend/app/firmware/firmware.bin
          printf '{"build": %s, "sha": "%s"}\n' "${BUILD}" "${SHA}" \
            > ../backend/app/firmware/latest.json
      - uses: actions/upload-artifact@v4
        with:
          name: firmware-dist
          path: backend/app/firmware/

  build:
    needs: [test, firmware]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: firmware-dist
          path: backend/app/firmware/
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

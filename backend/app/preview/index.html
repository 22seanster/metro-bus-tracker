<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metro Bus Tracker</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.25rem;
    background: #17120e; color: #cbc2b6;
    font-family: ui-monospace, Consolas, monospace; padding: 1rem;
  }
  .bezel {
    background: #5a3d28;
    border-radius: 10px; padding: 22px;
    box-shadow: 0 10px 40px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.15);
  }
  .panel { background: #000; padding: 8px; border-radius: 3px; line-height: 0; }
  img {
    display: block; width: min(88vw, 512px); height: auto;
    image-rendering: pixelated;
  }
  h1 { font-size: .8rem; letter-spacing: .25em; text-transform: uppercase; opacity: .6; margin: 0; }
  pre {
    font-size: .7rem; opacity: .75; max-width: 92vw; overflow-x: auto;
    background: #221a13; padding: .75rem 1rem; border-radius: 8px; margin: 0;
  }
</style>
</head>
<body>
  <h1>Metro Bus Tracker</h1>
  <div class="bezel"><div class="panel">
    <img id="frame" src="/frame.png?scale=8" alt="LED panel preview">
  </div></div>
  <pre id="status">loading…</pre>
<script>
  const img = document.getElementById("frame");
  setInterval(() => { img.src = "/frame.png?scale=8&t=" + Date.now(); }, 1000);
  async function refreshStatus() {
    try {
      const r = await fetch("/status");
      document.getElementById("status").textContent = JSON.stringify(await r.json(), null, 2);
    } catch (e) { /* backend restarting; keep last */ }
  }
  refreshStatus();
  setInterval(refreshStatus, 5000);
</script>
</body>
</html>

[platformio]
default_envs = esp32-s3

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit BusIO@1.17.4
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@3.0.15
    bblanchon/ArduinoJson@7.4.3
    https://github.com/tzapu/WiFiManager.git#v2.0.17
build_flags =
    -D CORE_DEBUG_LEVEL=1

; Default target: Waveshare ESP32-S3-RGB-Matrix (P4 64x32 panel).
[env:esp32-s3]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
build_flags =
    ${env.build_flags}
    -D BOARD_S3

; Fallback: classic ESP32 (e.g. ESP32-Trinity), uses the pins.h custom map.
[env:esp32dev]
platform = espressif32@7.0.1
board = esp32dev
build_flags =
    ${env.build_flags}

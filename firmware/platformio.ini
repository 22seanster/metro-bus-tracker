[platformio]
default_envs = esp32-s3

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit BusIO@1.17.4
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@3.0.15
    bblanchon/ArduinoJson@7.4.3
    https://github.com/tzapu/WiFiManager.git#v2.0.17
build_flags =
    -D CORE_DEBUG_LEVEL=1

; Default target: Waveshare ESP32-S3-RGB-Matrix (P4 64x32 panel).
[env:esp32-s3]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
; Flash header settings copied from Waveshare's factory-flashed XiaoZhi image
; (header bytes e9 03 02 5f = DIO, 32MB, 80MHz — decoded from the vendor repo's
; /firmware bin). The devkitc-1 default is QIO/8MB; QIO is unproven on this
; board's stacked 32MB flash (no vendor bin or doc uses it), DIO is factory-
; proven. The chip is an ESP32-S3-N32R16; PSRAM (16MB OPI) stays disabled —
; the HUB75 DMA buffers must live in internal SRAM anyway.
board_upload.flash_size = 32MB
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.partitions = partitions.csv
build_flags =
    ${env.build_flags}
    -D BOARD_S3
    ; Route Serial to the native USB-C port (HW CDC/JTAG). Mandatory on this
    ; board: UART0's pins are consumed by onboard peripherals (GPIO43 = I2S
    ; SCLK, GPIO44 = SD CMD), so without this every Serial.print — boot banner,
    ; OTA logs, the FATAL HUB75 diagnostic — is invisible.
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Fallback: classic ESP32 (e.g. ESP32-Trinity), uses the pins.h custom map.
[env:esp32dev]
platform = espressif32@7.0.1
board = esp32dev
build_flags =
    ${env.build_flags}

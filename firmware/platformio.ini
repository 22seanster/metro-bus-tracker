[platformio]
default_envs = esp32-s3

[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit GFX Library@1.12.6
    adafruit/Adafruit BusIO@1.17.4
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@3.0.15
    bblanchon/ArduinoJson@7.4.3
    https://github.com/tzapu/WiFiManager.git#v2.0.17
build_flags =
    -D CORE_DEBUG_LEVEL=1

; Default target: Waveshare ESP32-S3-RGB-Matrix (P4 64x32 panel).
[env:esp32-s3]
platform = espressif32@7.0.1
board = esp32-s3-devkitc-1
; The ESP32-S3-N32R16's 32MB flash is OCTAL (OPI) — confirmed on hardware
; 2026-07-19: the boot ROM prints "Octal Flash Mode Enabled", and a quad-SPI
; (qio/dio) build boot-loops with "spi_flash: Detected size(512k) smaller than
; the size in the binary image header". memory_type opi_opi selects the
; octal-flash prebuilt core; dout is the standard esptool write mode for OPI
; flash parts (the vendor's own test bin uses it too). PSRAM (16MB OPI) stays
; disabled — the HUB75 DMA buffers must live in internal SRAM anyway.
board_build.arduino.memory_type = opi_opi
board_upload.flash_size = 32MB
board_build.flash_mode = dout
board_build.f_flash = 80000000L
board_build.partitions = partitions.csv
build_flags =
    ${env.build_flags}
    -D BOARD_S3
    ; Route Serial to the native USB-C port (HW CDC/JTAG). Mandatory on this
    ; board: UART0's pins are consumed by onboard peripherals (GPIO43 = I2S
    ; SCLK, GPIO44 = SD CMD), so without this every Serial.print — boot banner,
    ; OTA logs, the FATAL HUB75 diagnostic — is invisible.
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Fallback: classic ESP32 (e.g. ESP32-Trinity), uses the pins.h custom map.
[env:esp32dev]
platform = espressif32@7.0.1
board = esp32dev
build_flags =
    ${env.build_flags}

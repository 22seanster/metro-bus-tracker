# Portainer CE: Stacks -> Add stack -> paste this (or point at the git repo).
# Set METRO_API_KEY in the stack's environment variables section once you have
# a key from https://api-portal.ridemetro.org/ - until then bus data is mocked.
services:
  bus-tracker:
    image: ghcr.io/22seanster/metro-bus-tracker:latest
    container_name: metro-bus-tracker
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      METRO_API_KEY: ${METRO_API_KEY:-}
      APP_TZ: America/Chicago
      # Defaults target stop 3216 (Lorraine St @ Cochran, inbound to Downtown TC),
      # routes 51/52. Override STOP_ID / ROUTE_IDS / DIRECTION_ID etc. here if needed.
      # Spotify now-playing: set these in the stack's environment variables section
      # (never commit the secret or the tokens). The screen registers only when the
      # client id, secret, and at least one refresh token are all present; leave
      # them unset and the stack behaves exactly as before.
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      # "sean:<refresh token>,wife:<refresh token>" - order = priority when both play.
      SPOTIFY_REFRESH_TOKENS: ${SPOTIFY_REFRESH_TOKENS:-}
      # Substring match on the PLAYING device's name. Leave empty for now: HomePod
      # and Bluetooth playback both report as the phone, so device names are a poor
      # "am I home?" signal. Presence gating is being solved separately.
      SPOTIFY_DEVICE_ALLOWLIST: ${SPOTIFY_DEVICE_ALLOWLIST:-}
      # Kill switch for scrolling track/artist text. Scrolling makes the device
      # poll ~10x/sec while the Spotify screen is up; set false to stop that
      # instantly (text freezes showing the head of each line) without a rebuild
      # or an OTA. Must stay listed here: a Portainer stack env var does not
      # reach the container unless compose references it.
      SPOTIFY_SCROLL: ${SPOTIFY_SCROLL:-true}
